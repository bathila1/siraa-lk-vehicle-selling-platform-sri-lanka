name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          # Stub values — build only verifies compilation
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key-placeholder-12345
          NEXT_PUBLIC_HCAPTCHA_SITE_KEY: 10000000-ffff-ffff-ffff-000000000001
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: stub
          NEXT_PUBLIC_SITE_URL: https://siraa.lk
          NEXT_PUBLIC_PAYHERE_CHECKOUT_URL: https://sandbox.payhere.lk/pay/checkout
        run: npm run build
